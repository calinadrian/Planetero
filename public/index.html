<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suika Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* LOBBY SCREEN */
    #lobby-screen {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    #lobby-screen h1 {
      font-size: 3rem;
      background: linear-gradient(135deg, #ff6b6b, #ffa500, #ffdd57);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    #lobby-screen p { color: #aaa; font-size: 1.1rem; }
    .btn {
      padding: 14px 40px;
      font-size: 1.1rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
    .btn-primary { background: linear-gradient(135deg, #6c5ce7, #a29bfe); color: #fff; }
    .btn-success { background: linear-gradient(135deg, #00b894, #55efc4); color: #fff; }
    .btn-danger { background: linear-gradient(135deg, #d63031, #ff7675); color: #fff; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .room-code-display {
      background: #16213e;
      border: 2px solid #6c5ce7;
      border-radius: 12px;
      padding: 16px 32px;
      font-size: 2rem;
      font-weight: bold;
      letter-spacing: 6px;
      color: #ffdd57;
      margin: 10px 0;
    }
    .input-group {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .input-group input {
      padding: 12px 18px;
      font-size: 1.1rem;
      border: 2px solid #333;
      border-radius: 10px;
      background: #16213e;
      color: #eee;
      width: 200px;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 3px;
    }
    .input-group input:focus { outline: none; border-color: #6c5ce7; }
    .player-list {
      background: #16213e;
      border-radius: 12px;
      padding: 16px 24px;
      min-width: 250px;
    }
    .player-list h3 { margin-bottom: 10px; color: #aaa; }
    .player-item {
      padding: 8px 0;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
    }
    .player-item:last-child { border-bottom: none; }
    .player-item .host-badge { color: #ffdd57; font-size: 0.85rem; }

    /* GAME SCREEN */
    #game-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 10px;
    }
    #game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 830px;
      padding: 10px 0;
      gap: 10px;
    }
    .score-panel {
      background: #16213e;
      border-radius: 10px;
      padding: 8px 16px;
      text-align: center;
      min-width: 100px;
    }
    .score-panel .label { font-size: 0.8rem; color: #aaa; }
    .score-panel .value { font-size: 1.5rem; font-weight: bold; }
    .score-panel.active { border: 2px solid #ffdd57; }
    #timer {
      font-size: 1.8rem;
      font-weight: bold;
      color: #ff6b6b;
      min-width: 80px;
      text-align: center;
    }
    #boards-container {
      display: flex;
      gap: 20px;
      justify-content: center;
      align-items: flex-start;
    }
    .board-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .board-label {
      font-size: 0.9rem;
      font-weight: bold;
      color: #aaa;
      padding: 4px 16px;
      background: #16213e;
      border-radius: 8px;
    }
    .board-label.you { color: #55efc4; border: 1px solid #55efc4; }
    .board-label.enemy { color: #ff7675; border: 1px solid #ff7675; }
    .board-wrapper canvas {
      border-radius: 12px;
      background: #0f3460;
      box-shadow: 0 0 20px rgba(108, 92, 231, 0.3);
      cursor: crosshair;
    }

    /* RESULT SCREEN */
    #result-screen {
      display: none;
      text-align: center;
      gap: 20px;
    }
    #result-screen h1 {
      font-size: 2.5rem;
      color: #ffdd57;
    }
    .result-scores {
      display: flex;
      gap: 30px;
      justify-content: center;
    }
    .result-card {
      background: #16213e;
      border-radius: 16px;
      padding: 30px 40px;
      text-align: center;
    }
    .result-card .name { font-size: 1.2rem; color: #aaa; margin-bottom: 10px; }
    .result-card .score { font-size: 3rem; font-weight: bold; }
    .result-card.winner { border: 3px solid #ffdd57; }
    .result-card.winner .name { color: #ffdd57; }
  </style>
</head>
<body>
  <!-- LOBBY -->
  <div id="lobby-screen">
    <h1>🍉 Suika Game</h1>
    <p>Drop fruits, merge them, beat your opponent!</p>

    <div id="create-section">
      <button class="btn btn-primary" id="btn-create">Create Room</button>
    </div>

    <div id="join-section" style="display:none;">
      <div class="room-code-display" id="room-code"></div>
      <p>Share this code with your opponent</p>
      <div class="player-list">
        <h3>Players</h3>
        <div id="player-list"></div>
      </div>
      <button class="btn btn-success" id="btn-start" disabled>Start Game</button>
    </div>

    <div id="join-existing">
      <p>Or join an existing room:</p>
      <div class="input-group">
        <input type="text" id="room-input" placeholder="ROOM CODE" maxlength="6">
        <button class="btn btn-primary" id="btn-join">Join</button>
      </div>
    </div>
  </div>

  <!-- GAME -->
  <div id="game-screen">
    <div id="game-header">
      <div class="score-panel" id="panel-p1">
        <div class="label">Player 1</div>
        <div class="value" id="score-p1">0</div>
      </div>
      <div id="timer">3:00</div>
      <div class="score-panel" id="panel-p2">
        <div class="label">Player 2</div>
        <div class="value" id="score-p2">0</div>
      </div>
    </div>
    <div id="boards-container">
      <div class="board-wrapper">
        <div class="board-label you">YOUR BOARD</div>
        <canvas id="canvas-my"></canvas>
      </div>
      <div class="board-wrapper">
        <div class="board-label enemy">OPPONENT</div>
        <canvas id="canvas-enemy"></canvas>
      </div>
    </div>
  </div>

  <!-- RESULT -->
  <div id="result-screen">
    <h1>Game Over!</h1>
    <div class="result-scores" id="result-scores"></div>
    <button class="btn btn-primary" onclick="location.reload()">Play Again</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="game.js"></script>
</body>
</html>
